name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60  # 设置超时限制

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          pip install buildozer==1.5.0 cython==3.0.0 requests==2.31.0
          pip install kivy==2.3.0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libffi-dev \
            unzip \
            ant \
            autoconf

      - name: Setup Android SDK using actions/setup-android
        uses: actions/setup-android@v2.1.0
        with:
          api-level: 33
          ndk-version: '25.1.8937393'
          components: 'platform-tools,build-tools;33.0.0'

      - name: Run Buildozer Build
        run: |
          export PATH="$PATH:${{ env.ANDROID_HOME }}/tools:${{ env.ANDROID_HOME }}/tools/bin:${{ env.ANDROID_HOME }}/platform-tools:${{ env.ANDROID_HOME }}/ndk/25.1.8937393"
          export ANDROID_SDK_ROOT="${{ env.ANDROID_HOME }}"
          echo "ANDROID_HOME=${{ env.ANDROID_HOME }}"
          echo "ANDROID_SDK_ROOT=${{ env.ANDROID_SDK_ROOT }}"
          echo "PATH=$PATH"
          
          buildozer -v android debug 2>&1 | tee build.log
          if [ ${PIPESTATUS[0]} -eq 0 ]; then
            echo "BUILD_STATUS=success" >> $GITHUB_ENV
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          fi
        continue-on-error: false

      - name: Upload APK Artifact
        if: ${{ env.BUILD_STATUS == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: V2RayTool_APK
          path: bin/*.apk
          
      - name: Upload Build Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: Build_Error_Logs
          path: buildozer.spec.log
