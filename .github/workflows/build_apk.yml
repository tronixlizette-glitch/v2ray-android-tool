name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy==2.3.0 requests certifi urllib3 charset-normalizer idna

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libsqlite3-dev \
            sqlite3 \
            bzip2 \
            libbz2-dev \
            libssl-dev \
            openssl \
            libgdbm-dev \
            libncursesw5-dev \
            libffi-dev \
            unzip \
            zip \
            autoconf \
            automake \
            libtool \
            pkg-config \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            ant \
            libunwind-dev \
            openjdk-17-jdk

      - name: Setup Android SDK & Accept Licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          
          # Initialize buildozer and SDK
          buildozer android update 2>&1 | tail -50 || true
          
          SDK_MANAGERS=$(find ~/.buildozer -name "sdkmanager" 2>/dev/null)
          for SDKMANAGER in $SDK_MANAGERS; do
            echo "Processing: $SDKMANAGER"
            yes | "$SDKMANAGER" --licenses 2>/dev/null || true
            yes | "$SDKMANAGER" "build-tools;33.0.0" "platforms;android-33" "platform-tools" 2>/dev/null || true
          done
          
          yes | buildozer android update 2>&1 | tail -30 || true
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Build Debug APK
        run: |
          buildozer -v android debug 2>&1
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: V2RayTool-debug-apk
          path: bin/*.apk
