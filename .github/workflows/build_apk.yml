name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60  # 设置超时限制

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          pip install buildozer==1.5.0 cython==3.0.0 requests==2.31.0
          pip install kivy==2.3.0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libffi-dev \
            unzip \
            ant \
            autoconf

      - name: Setup Android SDK
        run: |
          # 创建安全的 Android 配置文件
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg

          # 配置环境变量
          echo "ANDROID_HOME=/usr/lib/android-sdk" | tee -a ~/.bashrc
          echo "ANDROID_SDK_ROOT=/usr/lib/android-sdk" | tee -a ~/.bashrc
          source ~/.bashrc
          
          # 使用官方 SDK 工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -P /tmp
          unzip -qq /tmp/commandlinetools-linux-*.zip -d /usr/lib/android-cmdline-tools
          mkdir /usr/lib/android-sdk
          mv /usr/lib/android-cmdline-tools/cmdline-tools /usr/lib/android-sdk/
          export PATH="$PATH:/usr/lib/android-sdk/cmdline-tools/bin"

          # 接受许可协议
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          
          # 安装必需组件
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25b"
          sdkmanager --update
          
          # 验证安装
          sdkmanager --list | grep -E "(Platform-tools|Build-tools|NDK)"

      - name: Run Buildozer Build
        run: |
          buildozer -v android debug 2>&1
          echo "BUILD_STATUS=success" >> $GITHUB_ENV
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
          ANDROID_SDK_ROOT: "/usr/lib/android-sdk"
        continue-on-error: false

      - name: Upload APK Artifact
        if: ${{ env.BUILD_STATUS == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: V2RayTool_APK
          path: bin/*.apk
          
      - name: Upload Build Logs
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: Build_Error_Logs
          path: buildozer.spec.log
