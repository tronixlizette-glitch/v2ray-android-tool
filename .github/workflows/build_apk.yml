name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        run: |
          pip install buildozer==1.5.0 cython==3.0.0 requests==2.31.0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -yq \
            build-essential \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            zlib1g-dev \
            libsqlite3-dev \
            libffi-dev \
            unzip \
            ant \
            autoconf

      - name: Setup Android SDK and NDK
        run: |
          mkdir -p $HOME/android-sdk
          cd $HOME/android-sdk
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.0" "ndk;25.2.9519653"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          
          # 也设置到 bash 环境，让 buildozer 能找到
          echo "ANDROID_HOME=$ANDROID_HOME" >> ~/.bashrc
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> ~/.bashrc
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> ~/.bashrc
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> ~/.bashrc

      - name: Run Buildozer Build
        id: buildozer_build
        run: |
          set -e  # 遇到错误立即退出
          
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          export NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$NDK_HOME
          
          # 确认环境变量已设置
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "NDK_HOME=$NDK_HOME"
          
          # 进入工作目录
          cd $GITHUB_WORKSPACE
          
          # 运行构建
          buildozer -v android debug | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          # 检查构建是否成功
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "Buildozer failed with exit code $BUILD_EXIT_CODE"
            exit 1
          fi
          
          # 验证 APK 是否生成
          echo "Looking for APK in bin/..."
          find . -name "*.apk" -ls || echo "No APK found!"
          
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: V2RayTool_APK
          path: bin/*.apk
          
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build_Logs
          path: build.log